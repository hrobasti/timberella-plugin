# Maps log (or related wood) materials to the leaf blocks that belong to the same tree species.
# You can add or remove entries as needed; Timberella will only decay leaves listed for the
# logs that were actually felled.
log_to_leaves:
  OAK_LOG:
    - OAK_LEAVES
  STRIPPED_OAK_LOG:
    - OAK_LEAVES
  OAK_WOOD:
    - OAK_LEAVES
  STRIPPED_OAK_WOOD:
    - OAK_LEAVES

  SPRUCE_LOG:
    - SPRUCE_LEAVES
  STRIPPED_SPRUCE_LOG:
    - SPRUCE_LEAVES
  SPRUCE_WOOD:
    - SPRUCE_LEAVES
  STRIPPED_SPRUCE_WOOD:
    - SPRUCE_LEAVES

  BIRCH_LOG:
    - BIRCH_LEAVES
  STRIPPED_BIRCH_LOG:
    - BIRCH_LEAVES
  BIRCH_WOOD:
    - BIRCH_LEAVES
  STRIPPED_BIRCH_WOOD:
    - BIRCH_LEAVES

  JUNGLE_LOG:
    - JUNGLE_LEAVES
  STRIPPED_JUNGLE_LOG:
    - JUNGLE_LEAVES
  JUNGLE_WOOD:
    - JUNGLE_LEAVES
  STRIPPED_JUNGLE_WOOD:
    - JUNGLE_LEAVES

  ACACIA_LOG:
    - ACACIA_LEAVES
  STRIPPED_ACACIA_LOG:
    - ACACIA_LEAVES
  ACACIA_WOOD:
    - ACACIA_LEAVES
  STRIPPED_ACACIA_WOOD:
