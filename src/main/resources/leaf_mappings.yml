  CHERRY_LOG:
    - CHERRY_LEAVES
  STRIPPED_CHERRY_LOG:
    - CHERRY_LEAVES
  CHERRY_WOOD:
    - CHERRY_LEAVES
  STRIPPED_CHERRY_WOOD:
    - CHERRY_LEAVES

  MANGROVE_LOG:
