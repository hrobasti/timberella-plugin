  DARK_OAK_LOG:
    - DARK_OAK_LEAVES
  STRIPPED_DARK_OAK_LOG:
    - DARK_OAK_LEAVES
  DARK_OAK_WOOD:
    - DARK_OAK_LEAVES
  STRIPPED_DARK_OAK_WOOD:
